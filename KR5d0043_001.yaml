front:
  text: 黃帝內經素問遺篇卷之一二同卷所三
  hash: sha256:6f4f4d9d8fdcd3bbcd758114c75c694dd663acca4466167165a30b552b19a6e8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0043_HFL_001-001a, image: hfl/0663/0663-088.png}
body:
  text: 刺法論上黃帝問曰升降不前氣交有變即成暴鬱余已知之如何預救生靈可得却乎却之言去也何以去之岐伯稽首再拜對曰昭乎哉問臣聞夫子言既明天元須窮法刺可以折鬱扶運補弱全真瀉盛蠲餘令除斯苦夫子者祖師僦貸季折謂折伏也扶謂扶持也蠲除也斯此也令除此苦也帝曰願卒聞之岐伯曰升之不前即有甚凶也木欲升而天柱窒抑之木欲發鬱亦須待時木發待間氣也至天作間氣之時作也欲發可刺之也當刺足厥隂之井足厥隂之井即大敦穴在足大指端去爪甲上如韭葉三毛之中乃足厥隂之所出也於平旦水下一刻時以手按穴得動脈下針可及三分留六呼如得氣急出之先刺左後刺右又可春分日吐之無此管也火欲升而天蓬窒抑之火欲發鬱亦須待時火鬱待時至天作左間氣之時也其發也君火春分相火小滿即欲發之時也故君火相火同法即是二時而可預刺之也君火相火同刺包絡之滎心包絡之滎在手掌中勞宫穴也水下二刻以手按穴動脈應手刺可同身寸之三分留六呼得氣而急出之先左後右又法當春三泄汗也土欲升而天衝窒抑之土欲發鬱亦須待時土鬱待時至天作左間氣之時也土發鬱日維辰維也多於二間維發之也可預刺之也當刺足太隂之俞足太隂之俞太白穴在足內側核骨下陷者中足太隂之所注也水下三刻刺可同身寸之二分留七呼氣至急出之先左後右金欲升而天英窒抑之金欲發鬱亦須待時金鬱待時至天作左間氣之日也夏至之後金欲發鬱之時在火王後作可預刺也當刺手太隂之經手太隂之經者經渠穴也在兩手寸口肘陷者中手太隂之所行也動脈應手於水下四刻刺可同身寸之三分留三呼氣至急出針先左後右水欲升而天內窒抑之水欲發鬱亦須待時水鬱待時至天作左間氣之時也發於辰維之後火得王之時水可作也可以預用針刺之也當刺足少隂之合足少隂之合隂谷穴也在膝內輔骨之後大筋之下小筋之上按之應手屈膝而得足少隂之所入也刺可同身寸之四分留三呼動氣應手可刺急出之先刺左後刺右帝曰升之不前可以預備願聞其降可以先防防護者也岐伯曰既明其升必達其降也升降之道皆可先治也亦可以升而先刺也木欲降而地皛窒抑之降而不入抑之鬱發散而可得位三日不降八日降欲降而鬱先散而然後作地間氣者也降而鬱發暴如天間之待時也降而不下鬱可速矣降之不下急速如天鬱也便可刺之降可折其所勝也折勝其標而虛其本也故折其勝也當刺手太隂之所出刺手陽明之所入手太隂之所出少商穴也在手大指之端內側去爪甲如韭葉手太隂之井也刺可同身寸之一分留二呼而急出之手陽明之所入曲池穴也在肘外輔屈肘兩骨之間陷中手陽明之合刺可同身寸之一寸五分留七呼動氣應手至而急出之火欲降而地玄窒抑之降而不入抑之鬱發散而可矣二日不降七日降欲下而鬱散之速可刺之也當折其所勝可散其鬱火鬱折水可以除之當刺足少隂之所出刺足太陽之所入足少隂之出湧泉穴也在足心陷者中屈足捲指宛宛中足少隂之井刺可同身寸之三寸留三呼動氣至急出之先左後右足太陽之所入委中穴在膕中央約文中動脈應手足太陽之合也刺可同身寸之五分留七呼氣至而急出之先左後右二次同其法刺也土欲降而地蒼窒抑之降而不下抑之鬱發散而可入五日不降十日降欲降而鬱散而可速刺之當折其勝可散其鬱土鬱折水可除其苦當刺足厥隂之所出刺足少陽之所入足厥隂之所出大敦穴也在足大指端去爪甲上如韭葉及三毛之中足厥隂井也刺可同身寸之三分留十呼動氣急出之足少陽之所入陽陵泉穴在膝下同身寸之一寸䯒骨外廉陷者中是足少陽之合刺可同身寸之六分留十呼動氣至急出之金欲降而地彤窒抑之降而不下散抑之鬱發散而可入四日不降九日降欲下而鬱散可速刺也當折其勝可散其鬱金鬱折火可以除之當刺心包胳所出刺手少陽所入也心胞胳所出中衝穴也在中指之端去爪甲如韭葉是手心主之井刺可同身寸之一分留二呼動氣至急出之手少陽之所入天井穴也在肘外大骨之後肘後同身寸之一寸兩筋間陷者中屈肘得之手少陽合刺可同身寸之一寸留十呼動氣應手至而急出之水欲降而地阜窒抑之降而不下抑之鬱發散而可入一日不降六日降欲下而鬱散先可刺之也當折其土可散其鬱折其所勝可以散之也當刺足太隂之所出刺足陽明之所入足太隂之所出隱白穴也在足大趾之端側去爪甲如韭葉足太隂之井刺可同身寸之一分留三呼得氣至乃出之足陽明之所入三里穴在膝下三寸胻骨外廉兩筋間足陽明之所合刺可同身寸之五分留十呼得氣至而急出之帝曰五運之至有前後與升降往來有所承抑之可得聞乎刺法岐伯曰當取其化源也是故太過取之不及資之太過取之次抑其鬱取其運之化源令折鬱氣不及扶資以扶運氣以避虛邪也不及者當資其化源以補其所虧令不勝資取之法令出密語資取化源法方明於玄珠密語第一卷中黃帝內經素問遺篇卷之一
