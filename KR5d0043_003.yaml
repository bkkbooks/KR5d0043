front:
  text: 黃帝內經素問遺篇卷之三所四
  hash: sha256:636d7bb521b5604afc0d39648fb85923ef7c951d7df13408fcec43934c0a7ed2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0043_HFL_003-001a, image: hfl/0663/0663-143.png}
body:
  text: 刺法論下黃帝曰余聞五疫之至皆相染易無問大小病狀相似施救療如何可得不相移易者其病相染著如何得不相染也岐伯曰不相染者正氣存內邪不可干避其毒氣天牝從來復得其往邪毒之氣在於泄汗反下取之其氣入於中毒氣至腦中流入諸經之中令人染病矣如人嚏得此氣入鼻至腦中欲令勿投鼻中令嚏之即出爾如此即不相染也氣出於腦即不邪干從鼻而入腦欲干復出即無相染也氣出於腦即室先想心如日即正氣存中而神守其本即邪疫之氣不犯之欲將入於疫室先想青氣自肝而出左行於東化作林木如春柏之蒼翠次想白氣自肺而出右行於西化作戈甲如劎戟之明白利刃次想赤氣自心而出南行於上化作焰明如赫赫之炎燥次想黑氣自腎而出北行於下化作水如波浪之黑色次想黃氣自脾而出存於中央化作土如大地之黃色五氣護身之畢以想頭上如北斗之煌煌然後可入於疫室即正氣存中而邪疫不干又一法於春分之日日未出而吐之用遠志去心以水煎之飲二盞吐之不疫者也又一法於雨水日後三浴以藥泄汗注汗出臭者無疫也又一法小金丹方辰砂二兩水磨雄黃一兩葉子雌黃一兩紫金半兩粉作末令細之同入合中外固了地一尺築地實不用爐不須藥制用火二十斤煅之也七日終常令火及二十斤候冷七日取次日出合子埋藥地中七日亦須吉地者佳也取出順日研之三日煉白沙蜜為丸如梧桐子大每日望東吸日華氣一口冰水下一丸和氣咽之服十粒無疫干也黃帝問曰人虛即神游失守位使鬼神外干是致夭亡何以全真願聞刺法岐伯稽首再拜曰昭乎哉問謂神移失守雖在其體然不致死或有邪干故令夭壽邪未干而不病邪欲干而有卒亡也只如厥隂失守天以虛人氣肝虛感天重虛即魂遊於上肝虛天虛又遇出汗於肝而三虛散神游上位左無英君下即神光不聚而白尸鬼至令人卒亡者也邪干大氣身猶可刺之目中神彩有四肢雖冷心腹尚溫如口中無涎舌不卵縮者非感厥也即名尸厥故可救之復蘇刺其足少陽之所過足少陽之所過丘墟穴也在足外踝下如前陷者中去臨泣同身寸之五寸足少陽之原也用毫針於人近體暖針至溫以左手按穴咒曰太上元君常居其左制之三魂誦之三遍次呼三魂名爽靈胎光幽精誦之三遍次想青龍於穴下刺之可以同身寸之三分留三呼可徐徐出針親令人按氣於口中腹中嗚者可治之次刺肝之俞在背第九椎下兩傍各一寸半用毫針著身溫之左手按穴咒曰太微帝君元英制魂真元及本令入青雲又呼三魂名如前三遍刺入同身寸之三分留三呼次進二分留三呼復取針至三分留一呼徐徐出即氣及而復活人病心虛又遇君相二火司天失守感而三虛又或汗出於心即致神魂逆於上入泥丸也遇火不及黑尸鬼犯之令人暴亡不出一時可救之四肢冷氣雖閉絶不變色舌如不卵者可救目中神彩不變者可刺之也可刺手少陽之所過手少陽之所過陽池穴也在手表腕陷者中手少陽之原也用毫針人身溫暖以手按穴咒曰太一帝君泥丸總神丹無黑氣來復其真誦之三遍想赤鳳於穴下刺入二分留七呼次進一分留三呼復退留一呼徐徐手捫其穴即令復活也復刺心俞在背第五椎下兩傍各一寸半用毫針著身溫暖以手按穴咒曰丹房守靈五帝上青陽和布體來復黃庭誦之三遍刺可同身寸之七分留一分次進一分留一呼退至二分留一呼徐徐而出針以手捫其穴也人脾病又遇太隂司天失守感而三虛重虛而汗出於脾因而三虛智意二神游於上位故曰失守又遇土不及青尸鬼邪犯之於人令人暴亡不出一時可救之也四肢冷而身溫唇溫者可活之矣口中無涎即名尸厥可刺足陽明之所過足陽明之所過衝陽穴也在足肘上骨間動脉去陷谷三寸足陽明之原也用毫針著人身溫暖以手按穴咒曰常在魂庭始清太寧元和布氣六甲及真誦之三遍先想黃庭於穴下刺入三分留三呼次進二分留一呼徐徐退而以手捫之者也復刺脾之俞在背第十一椎下兩傍各一寸半用毫針以手按之咒曰太始定位總統坤元黃庭真氣來復遊全誦之三遍刺之三分留二呼進至二分動氣至徐徐出針人肺病遇陽明司天失守感而三虛人虛天虛又汗出於肺因而三虛即魂遊於上故曰失守之也又過金不及有赤尸鬼干人令人暴亡不出一時可救之雖無氣手足冷者心腹溫鼻微溫目中神彩不轉口中無涎舌卵不縮者皆可刺活也可刺手陽明之所過手陽明之所過合谷穴也在手大指次指間手陽明之原也用毫針著人體溫暖先以手按穴咒曰青氣真全帝符日元七魄歸右今復本田誦之三遍想白氣於穴下刺入三分留三呼次進針至五分留三呼復退一分留一呼徐徐出針以手捫其穴復活也復刺肺俞肺俞在背第三椎下兩傍各一寸半用毫針著體溫暖先以手按穴咒曰左元真人六合氣賔天符帝力來入其司誦之三遍針入一寸半留三呼次進二分留一呼徐徐出針以手捫其穴也人腎病又遇太陽司天失守感而三虛人虛天虛又感出汗於腎感而三虛即腎神退遊於黃庭雖不離體神光不聚故失守也又遇水運不及之年有黃尸鬼干犯人正氣吸人神魂致暴亡氣絶四肢厥冷心腹微溫眼色不易唇口及舌不變口中無涎即可救也可刺足太陽之所過足太陽之所過京骨穴也在足外側大骨下赤白肉際陷者中是足太陽之原也用毫針著人身溫暖以手按穴咒曰元陽育嬰五老及真泥丸玄華補精長存想黑氣於穴下刺入二分半留三呼乃進至三分留一呼徐徐出針以手捫其穴也刺足少陽之俞在背第十椎下兩傍各一寸半用毫針先以手按穴咒曰天玄日晶太和昆靈真元內守持入始青誦之三遍刺之三分留三呼次又進五分留三呼徐徐出針以手捫之黃帝問曰十二藏之相使神失位使神彩之不圓恐邪干犯治之可刺願聞其要五神失守以明刺法又言十二神之妙用也岐伯稽首再拜曰悉乎哉問至理道真宗此非聖帝焉究斯源是謂氣神合道契符上天人氣動合司天神氣相合由乎盛衰也心者君主之官神明出焉任治於物故為君主之官故心從形有神託心斯存是故心者神之舍也即真心失守虛而神不守位即妄遊諸室五神不安而乃令虛也可刺手少隂之源手少隂之源者即是兌骨穴也此是真心之源在掌後兌骨之端陷者中一名中都用長針口中溫暖刺入三分留三呼進一分留一呼徐徐出針以手捫其穴復蘇也肺者相傅之官治節出焉位高為君故官為相傅主行榮衛故治節由之喘息而自然有多語失節飲冷形寒悲愴是以肺神不守位即虛也可刺手太隂之源肺之源出於大淵在掌後大筋一寸五分間陷者中手太隂之所過用長針以口中溫針以手按穴刺入同身寸之三分留三呼動氣至而徐徐出針以手捫穴肝者將軍之官謀慮出焉勇而能斷故曰將軍潜發未萌故曰謀慮出焉怒而氣上遇氣交不前因而神失守神光不聚可用前法刺之全神守者也可刺足厥隂之源足厥隂之源太衝穴也在足大趾本笻後二寸陷者中乃肝脉所過為源用長針便於口中先溫針以手按穴刺可入三分留三呼進二分留二呼徐徐出針以手捫之也膽者中正之官訣斷出焉剛正果訣故官為中正直而不疑故訣斷出焉交動而卒怒怒而不息氣上而不守位使人中正不利欲成膈噎神光不聚未有邪干先可以刺治之者也可刺足少陽之源足少陽之源丘墟穴也在足外踝下如前陷者中去臨泣穴五寸足少陽之所過也用長針於口內溫針先以左手按穴刺可同身寸之三分留三呼進至五分留二呼徐徐出針以手捫之也膻中者臣使之官喜樂出焉膻中者在胸兩乳間為氣海手厥隂包絡之所居此作相火位故言臣使主其喜樂中及驚喜怒思恐即神失守位使人如失志恍恍然神光不聚邪來干之可用刺法治之正神和也可刺心包胳所流勞宫穴也在手掌中央動肘手心主之所流也用長針於口中溫先以左手按穴刺可同身寸之三分留二呼徐徐出針以手捫其穴也脾為諫議之官知周出焉心有所憶謂之意意中出焉謂之智智周萬事皆從意智也故知周出焉意有所著欲念生他想勞意不已智有所存神遊失守則神元不聚可預治之者也可刺脾之源脾之源在足內側核骨下陷者中是足太隂之所過為源用長針於口內溫針先以左手按穴刺可入三分留五呼進至三分留五呼即可徐徐而退針以手捫之胃為倉廪之官五味出焉包容五穀是謂倉廪之官榮養四傍故云五味出焉飲食飽甚汗出食飽房室即氣留滯注神遊失守邪干未至可以預治全真可刺胃之源胃之源衝陽穴也在足跗上如同身寸之五分骨間動脉上去陷谷穴五寸是足陽明之所過用長針於口中溫針先以左手按穴刺可入三分留三呼進至二分徐徐出針以手捫其穴大腸者傳道之官變化出焉傳道為傳不潔之道變化謂變化物之形故云傳道之官變化出焉男子有反之過故失守位邪非干之以刺法治之即令反却蘇也可刺大腸之源大腸之源合谷穴也在手大指次指曲骨間手陽明之所過也用長針口中溫針刺入二分留三分進至二分留一呼徐徐出之也小腸者受盛之官化物出焉承奉胃司受盛糟粕受元復化傳入大腸故云受盛之官化物出焉受而有異非合不合神失守可刺全真者可刺小腸之源小腸之源腕骨穴也在手外側腕前起骨下陷者中手太陽之所過也用長針於口中溫針先以左手按穴刺可入三分留三呼進二分留一呼徐徐出針次以手捫其穴也腎者作强之官伎巧出焉强於作用故曰作强造化形容故曰伎巧在女則當伎巧在男正曰作强人强作過失動合於三元八正之日故神失守位也故預刺而可全真者也刺其腎之源腎之源出於大溪在足內踝下跟骨之前陷者中足少隂之所過為源用長針於口中溫針先以左手按穴刺入三分留一呼進一分留一呼徐徐出針以手捫其穴也三焦者决瀆之官水道出焉引道隂陽開通閉塞故官司决瀆水道出焉决瀆者如四瀆入大海不離其水百川入海只江河淮濟入海不變其道故曰四瀆也三焦决瀆即精與水道不相合也故曰三焦者上中下上焦者主內而不出或非內而即內故不守中焦者主腐熟水穀或情動於中人或非動而動是謂孤動者神失守位下焦者主出而不內或當出而不出者故曰神失守位也刺三焦之源三焦之源陽池穴也在手表腕上陷者中手少陽脉之所過也用長針於口中溫針先以左手按穴刺可入三分留三呼進一分留一呼徐徐出針以手捫之也膀胱者州都之官精液藏焉氣化則能出矣位當孤府故曰都官居下內空故藏精液若得氣海之氣施化則溲便注泄氣海之不足則閟隱不通故曰氣化則能出矣人若滯便而合氣注膀胱故精泄氣通水道不宣通故神失守位即可以刺法全真者方知此法大妙也刺膀胱之源膀胱之源京骨穴也在足外側大骨下赤白肉際陷者中足太陽之所過用長針於口中溫針先以左手按穴刺可入三分留三呼進二分留三呼徐徐而出針以手捫其穴也凡此十二官者不得相失也失則灾害至故不得相失失之則神光不聚故有邪干犯之即害天命宜先刺以全真也是故刺法有全神養真之㫖亦法有修真之道非治疾也故要修養和神也神為主養之宗故作先也道貴常存補神固根精氣不散神守不分內三寶即神氣精一失其位三者皆傷三者同守故曰元和也然即神守而雖不去亦全真神如去即死矣然雖在其體身中而未去者亦非守位而全真也人神不守非達至真神不守即光明不足故要守真而聚神光而可以修真真勿令泄人為知道至真之要在乎天玄人在母腹先通天玄之息是謂玄牝名曰谷神之門一名神顗一名上部之地户一名人中之嶽一名胎息之門一名通天之要人能忘嗜欲定喜怒又所動隨天玄牝之息絶其想念如在母腹中之時命曰返天息而歸命回入寂滅反太初還元胎息之道者也神守天息復入本元命曰歸宗人有諸疾守位之神可入玄中之息而歸命之真全神之道可久覬也黃帝內絰素問遺篇卷之三
