front:
  text: 黄帝内經素問遺篇卷之四所五
  hash: sha256:0f8bb3cd66d1d0111861606bbf419ea2a891541563e06f862e7c3185a23639df
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0043_HFL_004-001a, image: hfl/0663/0663-176.png}
body:
  text: 本病論上黄帝問曰天元九窒余已知之願聞氣交何名失守六氣升降上下交位以五藏配天地之常岐伯曰謂其上下升降遷正退位各有經論上下各有不前故名失守也天元玉册云六氣常有三氣在天三氣在地也即一氣升天作左間氣一氣入地作右間氣一氣遷正作司天一氣遷正作在泉一氣退位作天左間氣一氣退位作地右間氣氣交有合常得位所在至當時即天地交乃變而方泰也天地不交乃作病也是故氣交失易位氣交乃變變易非常即四時失序萬化不安變民病也於是六氣有升不得其升者欲降而不得其降者有當遷正而不得遷正者自當其位而不得位故有如此之分則天地失其常政故萬民不安也帝曰升降不前願聞其故氣交有變何以明知再問窮源用也岐伯曰昭乎問哉明乎道矣氣交有變是謂天地機本欲升上見天柱窒二火欲升上見天蓬窒土欲升上見天衝窒金欲升上見天英窒水欲升上見天内窒是故天窒所勝而不前者但欲降而不得降者地窒刑之木欲降而地皛窒刑之火欲降而地玄窒刑之土欲降而地蒼窒刑之金欲降而地彤窒刑之水欲降而地阜窒刑之地九窒法天之象本勝之氣故不降也又有五運太過而先天而至者即交不前運逢陽年於有司之至也至後交勝而不過但欲升而不得其升中運抑之木欲升而中見金運勝之二火欲升而中見水運勝之土欲升而中見木運勝之金欲升而中見火運勝之水欲升而中見土運勝之者皆遇運太過早至其中而先於氣交而抑之不前者也但欲降而不得其降中運抑之然五運逢太過而先至其中故降而不下中運刑之抑之不前也於是有升之不前降之不下者有降之不下升而至天者有升降俱不前作如此之分别即氣交之變變之有異常各各不同灾有微甚者也是故上下天地之升降交氣有天窒地窒之勝剋中運抑伏淺深是故民病微甚異爾也帝曰願聞氣交遇會勝抑之由變成民病輕重何如欲明其變病本源之證也岐伯曰勝相會抑伏使然六氣升降乃經論之道也氣交之常也遇會之不常而相投之勝伏抑之成鬰者也是故辰戌之歲木氣升之主逢天柱勝而不前辰戌之歲太陽遷正作司天也即厥隂作地而作右間至此歲而升天作左間也又遇司天深計筭位至天柱窒也木欲升天柱金司天土勝之不前也又遇庚戌金運先天中運勝之忽然不前庚年金運先天至次後十三日始交司天欲升而金運抑之也木運升天金乃抑之或上見天柱窒或中見金運也升而不前即清生風少肅殺於春露霜復降草木乃萎民病温疫早發咽嗌乃乾四肢滿肢節皆痛乆而化鬱至天得左間日乃發作也即大風摧拉折隕鳴紊民病卒中徧痍手足不仁青埃見時風疫乃作民反張肢體直强治之達三俞也是故巳亥之歲君火升天主窒天蓬勝之不前君火以在地三年至巳亥之歲少隂升天作左間也此可定之也天蓬水司水天元册用除筭至坎宫除其數者即天蓬窒作主司故水窒勝也又厥隂木遷正則少隂未得升天水運以至其中者君火欲升而中水運抑之即天蓬水司勝即或水運抑之升之不前即清寒復作冷生旦暮民病伏陽而内生煩熱心神驚悸寒熱間作日乆成鬱二七日不降以爲日乆也即暴熱乃至赤風腫翳化疫温癘暖作至天作左間日乃作也民病伏熱内煩痹而生厥甚則血溢也赤氣瘴而化火疫皆煩而躁渴渴甚治之以泄之可止是故子午之歲太隂升天主窒天冲勝之不前太隂在地二年畢一年乃升天作少隂之左間也此即定矣其天衝窒至有法即不可前定之也如會天衝窒即土不可便升之也故曰升之不前也又或遇壬子木運先天而至者中木遇抑之也木升於大寒之日也木早至十三日上故升或遇此二木抑之者土遷抑甚而病深之也升天不前即風埃四起時舉埃昏雨濕不化民病風厥涎潮偏痍不隨脹滿乆而伏鬱即十日不升者至以爲日乆也即黄埃化疫也間氣上鬱之大疫也民病夭亡臉肢府黄疸滿閉濕令弗布兩化乃微黄埃起而黄風化疫皆肢體痛而口苦者也是故丑未之年少陽升天主窒天蓬勝之不前少隂在地三年畢至此歲升天作太隂左間也此可前定之也天蓬失筭位取之法不定也或遇之者即水運之可升之於火故不可便升也又或遇太隂未遷正者即少隂未升天也水運以至者即升天不前者有此二抑之者也升天不前即寒雰反布凛冽如冬水復涸冰再結暄暖乍作冷復布之寒暄不時民病伏陽在内煩熱生中心神驚駭寒熱間爭以乆成鬱二七不降以爲日乆也即暴熱乃生赤風氣瞳翳至天得位之日乃作化成鬱癘乃化作伏熱内煩痹而生厥甚則血溢赤氣生而化大疫皆煩而大熱凉藥不可制於火之鬱甚於君火故厥乃血溢也是故寅申之年陽明升天主窒天英勝之不前陽明在地三年畢至此年升天作少陽左間也即經論中乃定矣九窒隨天數不足金遇火窒之可勝之不可升天又或遇戊申戊寅火運先天而至太過歲未交司運先至一十三日金欲升天火運抑之此者遇一即不可升也或二者同會其抑大也升之不前即時雨不降西風數舉鹹鹵燥生地鹹鹵生白見硝而燥生也民病上熱喘嗽血溢乆而化鬱四九不升火爲日乆也即白埃翳霧清生殺氣民病脅滿悲傷寒鼽嚏嗌乾手拆皮膚燥白埃起時殺疫火生民病皆燥而咽乾治可刺之也是故卯酉之年太陽升天主窒天内勝之不前太陽在地三年畢此年升天作陽明之左間也即經論定矣升天即天内從之數法推之也水遇土窒之司勝之不可升之抑而復鮮又遇陽明未遷正者即太陽未升天也土運以至己酉己卯水欲升天土運抑之或見天内窒土刑勝之或見土運抑之有一不勝也升之不前即濕而熱蒸寒生兩間民病注不食不及化乆而成鬱十二日不降爲日乆也冷來客熱氷雹卒至民病厥逆而噦熱生於内氣痹於外足脛痠疼反生心悸懊熱暴煩而復厥黑埃起至寒疫至皆煩而悸厥治之可溢也黄帝曰升之不前余已盡知其㫖願聞降之不下可得明乎再欲細明其道也岐伯曰悉乎哉問是之謂天地微㫖可以盡陳斯道所謂升已必降也一升至天作左間一年二年遷正作司天三年退位作右間四年後降也至天三年次歲必降降而入地始爲左間也入地作左間一年次歲作遷正司地又次歲乃退作右間也如此升降往來命之六紀者矣三而在天三而在地一歲弗從命乎災害先明其升次窮其降也是故丑未之歲厥隂降地主窒地皛勝而不前又厥隂在天三年次年必降又遇地九窒中地皛西方兌塞金司勝之不可使入其地也抑之不入乃化成民病也又或遇少隂未退位少隂天數有餘作布政故未退一位也即厥隂未降下金運以至中或遇乙丑乙未中見金抑之也金運承之降之未下抑之變鬱鬱伏之氣降而不下成其民病木欲降下金承之降而不下蒼埃遠見白氣承之風舉埃昏清躁行殺霜露復下肅殺布令乆而不降抑之化鬱三日不降八日降不降化風疫也即作風躁相伏暄而反清草木萌動殺霜乃蟄未見懼清傷藏暄和令節大清殺之復布殺霜蒼埃見時風疫至治之吐而得復不可下是故寅申之歲少隂降地主窒地玄勝之不入少隂在天三年四年即降又遇地窒主司地玄窒水司降而不入抑伏化爲民病也又或遇丙申丙寅水運太過先天而至水運太過至其中即少隂降而不下乃成其鬱與民爲其災也君火欲降水運承之降而不下即彤雲纔見黑氣反生暄暖如舒寒常布靈凛冽復作天雲慘凄乆而不降伏之化鬱二日不降七日降不降即鬱發寒勝復熱赤風化疫民病面赤心煩頭痛目眩也赤氣彰而温病欲作也民皆夜卧不安黄風化疫解可泄也是故卯酉之歲太隂降地主窒地蒼勝之不入太隂在天三年至此年降入地作少隂左間也又遇主窒地蒼窒木司勝之不入也又或少陽未退位者即太隂未得降也或木運以至丁酉丁卯木運承之降而不下即黄雲見而青霞彰鬱蒸作而大風霧翳埃勝折損乃作乆而不降也伏之化鬱十日不降爲日乆也天埃黄氣地布濕蒸民病四肢不舉昏眩肢節痛腹滿填臆黄風三舉民病温濕皆痞滿治可大下愈是故辰戌之歲少陽降地主窒地玄勝之不入少陽在天三年畢次年下降入地作太隂左間主地玄窒水司勝不入而化民病也又或遇水運太過先天而至也丙辰丙戌水運者也水運承之水降不下即彤雲纔見黑氣反生暄暖欲生冷氣卒至甚即冰雹也乆而不降伏之化鬱二日不降七日降不降即鬱發也冷氣復熱赤風化疫民病面赤心煩頭痛目眩也赤氣彰而熱病欲作也民病夜卧不安黄風化疫解可泄之而愈也是故巳亥之歲陽明降地主窒地彤勝而不入陽明在天三年次年下降入地作少陽左間也又遇主窒地彤窒火司勝之不入即化成病也又或遇太隂未退位即少陽未得降即火運以至之癸巳癸亥火運承之不下即天清而肅赤氣乃彰暄熱反作民皆昏倦夜卧不安咽乾引飲懊熱内煩大清朝暮暄還復作九而不降伏之化鬱四日不降九日降不降即鬱發也天清薄寒遠生白氣民病掉眩手足直而不仁兩脇滿目忙忙白氣豐而殺疫至民皆燥而咽乾鼽衄治可刺之是故子午之年太陽降地主窒地阜勝之降而不入太陽在天三年次年復降入地作陽明左間又遇地阜土司勝之不入者也又或遇土運太過先天而至甲子甲午黄帝内經素問遺篇卷之四
