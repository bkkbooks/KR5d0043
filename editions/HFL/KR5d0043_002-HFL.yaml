front:
  text: 黄帝内經素問遺篇卷之二
  hash: sha256:569bd55cf4d3cbc79cca5718c5d7f71f5db74a5834b12a1340456e5dd7465a62
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0043_HFL_002-001a, image: hfl/0663/0663-103.png}
body:
  text: 刺法論中黄帝問曰升降之刺以知要願聞司天未得遷正使司化之失其常政即萬化之機其皆妄然與民爲病可得先除欲濟群生願聞其說明其遷正故可預防岐伯稽首再拜曰悉乎哉問言其至理聖念慈憫欲濟群生臣乃盡陳斯道可申洞微申顯也洞深也微妙也言可盡顯深妙太陽復布即厥隂不遷正即天運不和順四序失合而作疫也不遷正氣塞於上當寫足厥隂之所流氣舒而復塞之故寫之當寫足厥隂之所流行間穴也在足大趾之間動脉應手陷者中足厥隂之滎刺可同身寸之六分留七呼動氣至而急出之厥隂復布少隂不遷正天失時令即氣令不正也不遷正即氣塞於上熱欲化而風乃布外也當刺心包胳脉之所流心包胳脉之所流勞宫穴也在掌中央刺可同身寸之三分留六呼動氣至而急出也少隂復布太隂不遷正子午天數有餘丑未不得中正也不遷正即氣留於上雨欲化而熱布於天當刺足太隂之所流足太隂之所流大都穴也在足大趾本節後陷者中足太隂脉之滎也刺可同身寸之三分留七呼動氣至而出之太隂復布少陽不遷正丑未天數有餘寅申未得中正不遷正則氣塞未通熱欲化而雨復布天當刺手少陽之所流手少陽之所流液門穴也在手小指次指間陷者中手少陽之滎也刺可同身寸之二分留三呼動氣至而急出也少陽復布則陽明不遷正寅申天數有餘卯酉未得司天不遷正則氣未通上燥欲治天熱化復治當刺手太隂之所流手太隂之所流魚際穴也在手大指本節後内側散脉文中手太隂之滎也刺可同身寸之二分留三呼動氣至而急出之陽明復布太陽不遷正卯酉天數未終辰戌未得司正不遷正則復塞其氣寒欲行天而燥復化當刺足少隂之所流足少隂之所流然谷穴也在足内踝前起大骨下陷中足少隂之滎也刺可同身寸之三分留三呼動氣至而出之帝曰遷正不前以通其要願聞不退欲折其餘無令過失可得明乎岐伯曰氣過有餘復作布正是名不過位也即名布正再治天而不能退位使地氣不得後化新司天未可遷正故復布化令如舊歲新歲司天未得中司去歲司天仍舊治天是故氣過天令不常故與民作災之病也巳亥之歲天數有餘故厥隂不退位也至子午之年猶尚治天風行於上木化布天雨濕之化不令風化至酷作災當刺足厥隂之所入足厥隂之所入曲泉穴也在膝内輔骨下大筋上小筋下後陷者中屈膝而得之足厥隂之合也刺可同身寸之六分留七呼動氣至急出其針也子午之歲天數有餘故少隂不退位也至丑未之年猶尚治天熱行於上火餘化布天燥清之虧雨化不令熱化復行天令也當刺手厥隂之所入心包之所入曲澤穴也在肘内廉下陷者中屈肘而取之手厥隂之令也刺可同身寸之三分留七呼動氣至而急出之丑未之歲天數有餘故太隂不退位也至寅申之年猶尚治天也濕行於上雨化布天寒化虧熱化不令濕化復布行天令當刺足太隂之所入足太隂之所入太隂陵泉穴也在内側輔骨下陷者中足太隂之合刺可同身寸之五分留七呼動氣至而急出之也寅申之歲天數有餘故少陽不退位也至卯酉之年猶尚治天熱行於上火化布天燥清令虧熱化復治布行天令當刺手少陽之所入手少陽之所入天井穴也在肘外大骨後肘後上一寸兩筋間陷中屈肘得之手少陽之合也刺可同身寸之三分動氣至而急出之也卯酉之歲天數有餘故陽明不退位也至辰戌年猶尚治天也行於上燥化布天風化虧而寒化不令清化復治布行天令當刺手太隂之所入手太隂之所入尺澤穴也在肘約文中動脉應手手太隂之所合也刺可同身寸之三寸留三呼動氣至而急出之辰戌之歲天數有餘故太陽不退位也至巳亥之年猶尚治天也寒行於上凛水化布天熱化令虧風化不令寒化復治布行天令當刺足少隂之之所入足少隂之所入隂谷穴也在膝下内輔骨之後大筋之下外筋之上按之應手屈膝而得之足少隂之合刺可同身寸之四分動氣至而岀之故天地氣逆化成民病以法刺之預可平痾人氣通乎天地也氣交有變前後餘退可天元刺其餘源始終可平也黄帝問曰剛柔二干失守其位使天運之氣皆虚乎與民爲病可得平乎天運如虚可以法刺可除之也岐伯曰深乎哉問明其奥㫖天地迭移三年化疫是謂根之可見必有逃門是謂根究天地之灾必有遐危逃生之門户假令甲子剛柔失守柔得其位上失其剛雖得交司數可未至甲子上未終司己卯下雖遷正是謂柔干孤虚其下也剛未正之己不得其甲即土運反虚而木廼勝剛未正柔孤而有虧甲不正於己也土運不令正失少隂不化是故天與皆虚而使邪化疫者也時序不令即音律非從司天猶布而中運有勝至矣甲未臨而己已至律無音而吕有聲即黄鍾大宫不應夾鍾少宫即應以表己卯下位孤主土運者也如此三年變大疫也甚則速首尾三年至詳其微甚察其淺深大虚而布政日乆即深也深即甚矣運未正即勝至乆即深甚也甚即深首尾二年至者也欲至而可刺刺之則以明其刺法者即是布正而未遷正者可刺其即令之病也只言知者是以三年中有大疫至刺補其夭之之吉也即其細詳微甚知其所至之斯可先齊之者也當先補腎俞土疫至而腎虚者先補之腎俞在骨第十四椎下兩傍各同身寸之一寸五分未刺時先口銜針暖而用之用圓利針臨刺時咒曰五帝上眞六甲玄靈氣符至隂百邪閉理念三遍自口中取針先刺二分留六呼次入針至三分動氣至而徐徐出針以手捫之令受針人咽氣三次又可定神魂者次三日可刺足太隂之所注足太隂之所注大白穴也在内踝核骨下陷者中足太隂脉之所注也先以口㗸針令温欲下針時咒曰帝扶天形護命成靈誦之三遍乃刺三分留七呼動氣至而急出其針也又有下位己卯不至而甲子孤立者次三年作土癘其法補瀉一如甲子同法也即甲子甲戌甲申甲午甲辰甲寅并己丑己亥己酉己未己巳己卯凡甲己上下失守皆此一法而已其刺以畢又不須夜行及遠行令七日潔清淨齋戒所有自來腎有乆病者可以寅時面向南净神不亂思閉氣不息七遍以引頸嚥氣順之如嚥甚硬物如此七遍後餌舌下津令無數仙家嚥氣可以深根固蒂以子受母氣也嚥下氣令腹中嗚至臍下子氣見母元氣故曰返本還元也乆餌之令深根以養固蒂也故嚥氣津者此名天池之水可乆餌之資精氣血蕩滌五藏先溉元海一名離宫之水一名玉池一名神水不可唾之但可餌之以補精血可益元海也假令丙寅剛柔失守柔得其位上失其剛也雖得其交歲而丙未遷正治天下辛巳獨治其泉上位丙失其剛干故中水運不得運太過也反受土勝之上剛干失守下柔不可獨主之柔干在上猶言不及何况柔失剛者也中水運非太過不可執法而定之不以諸丙年作其水太過也當推之天數而知有虧也布天有餘而失守上正天雖主治之此即布正之化正司主歲未得正位也天地不合即律吕音異柔干至而吕有音應剛干未遷而律管無聲即少羽嗚響而大羽也如此即天運失序雖有化而非常化也後三年變疫變有微甚故有遲速當推其天數之淺深也詳其微甚差有大小大差七分小差五分每一分一十五日大差速至小差徐徐而至之也徐至即後三年至甚即首三年推數差速即知運遲當先補心俞心俞在背第五椎下兩傍各一寸半用圓利針於日中令温暖次以手按穴得其氣動乃咒曰太始上清丹元守靈誦之三遍先想火光於穴下然後刺可同身寸之一寸半留七呼得氣至次進針三分以手彈之令氣至而下針得動氣至而徐徐出針次以手捫其穴令受針人閉氣三息而嚥氣也次五日可刺腎之所入腎之所入隂谷穴也在膝内輔骨之後大筋之下小筋之上按之應手屈膝而得之用圓利針令口中温暖先以手按穴乃咒曰大微帝君五氣及眞六辛都司符扶黑雲誦之一遍刺可入同身寸之四分得動氣至而急出之又有下位地甲子辛巳柔不附剛亦名失守即地運皆虚後三年變水癘即刺法皆如此矣即丙寅丙子丙戌丙申丙午丙辰辛丑辛亥辛酉辛未辛巳辛卯如此上下失守皆推大小差而刺之其刺如畢愼其大喜欲情於中如不忌即其氣復散也令靜七日七日後神氣實而水疫不傷心欲實令少思思即傷神居當澄心而神守中即道自降而其氣復上人亂想勞神即隂中鬼王勞神即神役苦志心亂故夭人命實即神和志安心靜即中也假令庚辰剛柔失守乙得其位上失其庚即謂柔失其剛也雖得其歲即庚未得中位也乙得下位治其地上位庚失其剛干故中金運不得太過反受火勝之也上位失守下位無合乙未在下主地孤立也上無剛干正之天運虚乙庚金運故非相招上下相招隂陽相合也司天與運各得其化布天未退中運勝來不以陽年元勝復支干不合有上下相錯謂之失守庚不與乙相對合也姑洗林鍾商音不應也失守即同聲不相應也姑洗上管庚辰太商不如應林鍾下管乙未少商獨應矣如此即天運化易故四序非常也三年變大疫金疫又名殺疫詳其天數差有微甚大差七分即氣過一百五日即甚矣小差五分即氣過七十五日即微也微即微三年至微即徐也甚即甚三年至甚即速也當先補肝俞肝俞在背第九椎下兩傍各一寸半用圓利針以口温暖先以手按穴得動氣欲下針而咒曰氣從始清帝符六丁左施蒼城右入黄庭誦之三過先想青氣於穴下然後刺之三分得氣而進針針入五分動氣至而徐徐出針以手捫其穴令受針人嚥氣次三日可刺肺之所行肺之所行經渠穴也在手寸口陷中手太隂經也用圓利針於口内温令暖先以左手按穴乃咒曰太始上眞五符帝君元和氣合司入其神誦之三遍刺可同身寸之三分留二呼動氣至而出其針也刺畢可靜神七日愼勿大怒怒必眞氣却散之又或在下地甲子乙未失守者即一柔干即上庚獨治之亦名失守者即孤主之三年變癘名曰金癘亦名殺癘其至待時也詳其地數之差亦椎其微甚可知遲速爾速至共三年遲即後三年其至如金疫刺法同前也諸位乙庚失守刺法同即天運各異金殺丁之災化民病也同刺而却之也肝欲平即勿怒怒即隂生肝爲陽神也隂生即陽夭夜卧念安其志勿誦惡語即陽神魂守中假令壬午剛柔失守下得其位上失其主即司天布正木運反虚也雖交歲而天未遷正中運勝即地見丁酉獨主其運故行燥勝天未熱化是名二虚者已上壬未遷正下丁獨然即雖陽年虧及不同災亦然三日肝自病風化不令運失其壬未得其位天如布退可得遷正不假復而正角上下失守相招其有期推之天别又及幾分天如復位故得相招者也差之微甚各有其數也差七分計一百五日即大差之期也差五分即七十五日其下者又微也律吕二角失而不和同音有日上律蕤賔下吕南吕上大角不應下少角應故二角失而不和也後壬午遷正之日即上下角同聲相應微甚如見三年大疫微即至乙酉甚即至甲申甚速微徐也當刺脾之俞脾之俞在背第十一椎下兩傍各一寸半動脉應手用圓利針令口中温暖而刺之即咒曰五精智精六甲玄靈帝符元首大始受眞誦之三遍先想黄氣於穴下然後刺之二分得氣至而次進之又得動氣次進之二進各一分留五呼即徐徐出針以手捫之令其人不息三遍而嚥津也次三日可刺肝之所出也肝之所出大敦穴也在足大趾端去爪甲如韭葉及三毛之中足厥隂之井也用圓利針令口中温暖而刺之即咒曰眞至玄大道冥然五神各位氣缺三田誦之然後可刺入同身寸之三分留十呼動氣至而出其針刺畢靜神七日勿大醉歌樂其氣復散又勿飽食勿食生物歌樂者即脾神動而氣散也醉即性亂飽即食脹故愼忌之食生物即傷脾氣也欲令脾實氣無滯飽無乆坐食無大酸無食一切生物宜甘宜淡淡入胃也宜益府淡者土之薄味也而又次於甘者無閑坐無乆卧故養脾也又或地下甲子丁酉失守其位未得中司即氣不當位丁不與壬奉合者亦名失守非名合德故柔不附剛天地二甲子上下不相招故隂陽有錯即中運失其歲合之常政也即地運不合三年變癘故名木癘又名風癘其至有即亦推其微甚其刺法一如木疫之法即諸丁壬上下失守皆同一法刺之假令戊申剛柔失守戊與癸合也天地二甲子即戊申合癸亥也下位癸亥至地其主地正司也上下位戊申過丁未天數未退而復布天故失守戊癸不合也戊癸雖火運陽年不太過也戊未正司癸下獨治故非太過反受水勝之也上失其剛柔獨主其氣不正故有邪干水運失守於上中下運有虧也故天虚而地猶主之中見火運水來犯之故曰邪干迭移其位差有淺深天數過差亦有多少却得奉合合要在目數也欲至將合音律先同中火運徵也上下二律吕上窮太少二徵合音同如此天運失時三年之中火疫至矣速至庚戌也徐徐至辛亥所作也當刺肺之俞肺俞在背第三椎下兩傍各一寸半動肘應手用圓利針令口中温暖先以手按穴乃刺之咒曰眞邪用摶氣灌元神帝符反本位合其親誦之三遍刺之二分候氣欲至想白炁於穴下次進一分得氣至而徐徐出其針以手捫之於其穴也然可立愈也刺畢靜神七日勿大悲傷也悲傷即肺動而眞氣復散也凡喜怒悲樂恐皆不可過矣此五者皆可動天亂眞神也故聖人忘縁滅動念可存神也故神能主形神在形全可以身安道常長存也人欲實肺者要在息氣也無大喘息愼勿多言語及呼吸多氣喘及言語多及飲冷形寒之食鹹多大忌悲傷喜怒冷傷其肺神也又或地下甲子癸亥失守者即柔失守位也即上失其剛也即亦名戊癸不相合德者也即運與地虚後三年變癘即名火癘與火疫同也即法刺一體即諸戊諸癸上下同一體是故立地五年以明失守以濕法刺於是疫之與癘即是上下剛柔之名也窮歸一體也即刺疫法只有五法即總其諸位失守故只歸五行而統之也此皆五疫癘歸天地不相和之氣化爲疫癘大傷人之命也故達天元可通法刺復濟生民也黄帝内經素問遺篇卷之二
