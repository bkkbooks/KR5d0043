front:
  text: 黃帝内經素問遺篇卷之五所六
  hash: sha256:6e468fef283fe9b4c8cfdcae5e98938c6e741ada7553b62944923411566463be
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0043_HFL_005-001a, image: hfl/0664/0664-004.png}
body:
  text: 本病論土運承之降而不入即天彰黑氣瞑暗凄慘纔施黄埃而布濕寒化令氣蒸濕復令久而不降伏之化鬱十二日不降者即鬱其發也民病大厥四肢重怠陰痿少力天布沉陰蒸濕間作黑氣彰而寒疫至民病皆厥而體重治可益之也帝曰升降不前晰知其宗願聞遷正可得眀乎晰明也岐伯曰正司中位是謂遷正位司天不得其遷正者即前司天以過交司之日以過大寒日别歲正之初氣未至也即遇司天太過有餘日也即仍舊治天數新司天未得遷正也年即以交即司天之氣未交司故也厥陰不遷正即風喧不時花卉萎瘁民病淋溲目系轉轉筋喜怒小便赤太陽司天天數有餘如退位之日厥陰得治遷正也風欲令而寒由不去温喧不正春正失時雖得初氣天令不傳木氣不伸民乃病肝少陰不遷正即冷氣不退春冷復寒喧暖不時民病寒熱四肢煩痛腰脊强直厥陰司天天數有餘厥陰雖有餘日别位司天皆天數終日始遷正如少陰至二月春分得位正之時乃造化變便可遷正乃合司天也木氣雖有餘位不過於君火也木氣有餘數不盡有餘日復治天治數未終遇君火得時化春分日便可遷正木猶未退即可同治於天也其餘氣皆無此也太陰不遷正即雲雨失令萬物枯焦當生不發民病手足肢節腫滿大腹水腫墳臆不食飧泄脅滿四肢不舉少陰司天天數未終故曰太陰不得遷正少陰數終可得遷正也雨化欲令熱猶治之温煦於氣亢而不澤少陰有餘未盡天數故不退位即太陰未得遷正即土氣不申而民病於脾也少陽不遷正即炎灼弗令苗莠不榮酷暑於秋肅殺晩至霜露不時民病瘖瘧骨熱心悸驚駭甚時血溢雖有寅申之年土尚治之退位之日火行酷暑於後故涉暑於秋也陽明不遷正則暑化於前肅於後草木反榮民病寒熱鼽嶢皮毛折爪甲枯焦甚則喘噉息高悲傷不樂少陽司天天數有餘如退位日陽明不遷正也熱化乃布燥化未令即清勁未行肺金復病雖得卯酉之年猶火化熱之令也故肺重復受病太陽不遷正即冬清反寒易令於春殺霜在前寒氷於後陽光復治凛洌不作雰雲待時民病温厲至喉閉溢乾煩燥而渴喘息而有音也陽明司天天數有餘退位日太陽遷正故多煩燥渴喘者也寒化待燥猶治天氣過失序與民作灾雖得辰戌之年猶尚清化治天故失序也帝曰遷正早晩以命其旨願聞退位可得明哉岐伯曰所謂不退者即天數未終天數未終其氣仍治雖遇交司由未退位也即天數有餘名曰復布政故名曰再治天也即天令如故而不退位也此治天下過而不退位猶在天厥陰不退位即大風早舉時雨不降濕令不化民病温疫疵廢風生民病皆肢節痛頭目痛伏熱内煩咽喉乾引飮厥陰天數有餘在本數之上司天氣高而灾化善也令作布政而復下灾故反甚之者也少陰不退位即温生春冬蟄蟲早至草木發生民病膈熱咽乾血溢驚駭小便赤澀丹瘤疹瘡瘍留毒少陰天下有餘過歲而復作布政天令酷灾矣太陰不退位而取寒暑不時埃昏布作温令不去民病四肢少力食飲不下泄注淋滿足脛寒陰痿閉塞失溺小便數太陰天下有餘過歲而猶尚治天其氣其下矣病至腎也少陽不退位即熱生於春暑乃後化冬温不凍流水不冰蟄虫出見民病少氣寒熱更作便血上熱小腹堅滿小便赤沃甚則血溢少陽天數有餘至過歲由治天甚則氣復下其灾至脾肺藏也陽明不退位即春生清冷草木晩榮寒熱間作民病嘔吐暴注食飲不下大便乾燥四肢不舉目瞑掉眩陽明天數太過至交歲而猶尚治天氣復降其灾至甚於肝藏也帝曰天歲早晚余以知之願聞地數可得聞乎岐伯曰地下遷正升及退位不前之法即地土產化萬物失時之化也即應之生萬物之不時數無次序天令與民作灾令於上下二干失移之中者也帝曰余聞天地二甲子十二十二支上下經緯天地數有迭移失守其位可得昭乎同天地二甲子有上下不合其德者爲失守也岐伯曰失之迭位者謂雖得歲正未得正位之司即四時不節即生大疫天地不合德即名天地失節即上下二管音不相應即大不主與天主失節上下失音萬物不安也注玄珠密語云陽年三十年除六年天刑計有太過二十四年除庚子庚午君火刑金連庚寅庚申相火刑金運戊戌戊辰太陽刑火運也此爲與其天地氣上臨中運不得太過者也除此六年皆作太過之用令不然之旨此即太過作陽年中運餘也忽有上下失支迭位故不爲者也今言迭支送位皆可作其不及也陽年者運太過也五音皆定矣太音也連自勝有餘而無邪傷故名正化疫也其剛干不相對柔干即上下不相招即陰陽相錯天地不合德中運雖陽多而作太過故有勝復乃至者也假令甲子陽年土運太窒土太過即運傷鱗蟲勝及腎藏氣不及土勝於水也即黃鍾之管音高故曰太窒也候甲子之氣應者上應鎭星大而明也如癸亥天數有餘者年雖交得甲子甲雖臨子未得遷正厥陰猶尚治天年雖甲子司天尚化風冷厥陰猶復布正於天也地已遷正陽明在泉或名司地即戴高者去歲少陽以作右間癸亥司地少陽退位以作地下之右間氣者也即厥陰之地陽眀故不相和奉者也故曰上下不相招陰陽有相錯即癸與巳相對故天地不合德即以不合甲也癸己相會土運太過虛反受木勝故非太過也何以言土運太過况黄鍾不應太室木旣勝而金還復金旣復而少陰如至即木勝如火而金復微謂少陰見厥陰退位而少陰立至故金欲復而火至故復有少也如此則甲己失守後三年化成土疫晩至於卯甲子至丁卯四年至早至丙寅甲子至丙寅三年至土疫至也至於四維時也大小善惡推其天地詳乎太一又只如甲子年如甲至子而合應交司而治天少陰主甲子年司天遷正應時也即下己卯未遷正而戊寅少陽未退位者亦甲己下有合也即甲與戊相對子與寅配位也即土運非太過而木乃乘虛而勝土也金次又行復勝之即反邪化也即勝之小而或不復後三年化厲名曰土癘其狀如土疫者本是自天來癘從地至故反化邪生也陰陽天地殊異爾故其大小善惡一如天地之法旨也假令丙寅陽年太過如乙丑天數有餘者雖交得丙寅雖丙得寅猶未遷正而作司天太陰尚治天也地己遷正厥陰司地或作在泉去歲太陽以作右間乙丑司地庚辰以退位而作右間即天太陰而地厥故地不奉天化也即上下不相招陰陽有相錯即辛與乙不相合故不合其德也乙辛相會水運太虛反受土勝故非太過即太簇之管太羽不應土勝而雨化水復即風即天地非其時而有其氣有化大疫即與陰陽復不同也此者丙辛失守其會後三年化成水疫晩至己巳丙寅至己巳四年早至戊辰丙寅至戊辰三年甚即速微即徐徐至己巳水疫至也大小善惡推其天地數乃太乙遊宫又只如丙寅年丙至寅且合應交司而治天少陽至而作司天應時遷正即辛己未得遷正而庚辰太陽未退位者亦丙辛不合德也即丙與庚相對辰與寅相配位也即水運非太過也即水運亦小虛而小勝或有復丙寅至也即無復也後三年化厲名曰水厲其狀如水疫一名寒疫治法如前假令庚辰陽年太過如己卯天數有餘者雖交得庚辰年也雖庚臨辰未遷正陽明猶尚治天地以遷正太陰司地即是在泉云歲少陰以作右間己卯年地甲子以退少陰作右間也即天陽明而地太陰也故地下奉天也乙巳相會金運太虛反受火勝故非太過也即姑洗之管太商不應火勝熱化水復寒刑此天地非時行不節之令即三年始成大疫行天下也此乙庚失守其後三年化成金疫也速至壬午庚辰至壬午三年是其速至徐至癸未金疫至也大小善惡推本年天數及太乙也疫至之年又遇失守其灾大也不見五福及其太乙且惡死人太半也如却㑹合德者灾小爾如見五福與其太一者其灾且小善滅其半也又只如庚辰如庚至辰且應交司而治天太陽主庚辰年司天應時遷正而治天也即下乙未未得遷正者即地甲午少陰未退位者且乙庚不合德也即甲庚相對辰午相配此名失守非配太過即下乙未干失剛亦金運小虛也有小勝或無復太陰至未即不復也後三年化厲名曰金厲其狀如金疫也金疫又名殺疫金癘又名殺癘治法如前假令壬午陽年太過如辛已天數有餘者雖交後壬午年也雖壬臨午猶未遷正厥陰猶尚治天地已遷正陽明在泉丁酉治也去歲丙申少陽以作右間壬午年丁酉遷正辛巳年丙中退位也即天厥陰而地陽明故地不奉天者也即陽明當上奉少陰不與厥陰奉合也故丁酉與辛巳不相合德也丁辛相合會木運太虛反受金勝故非太過也即蕤賓之管太角不應金行燥勝火化熱復此天地非時行不節之氣即三年始成大疫甚即速微即徐速即首尾二年徐即後三年作疫至大小善惡推疫至之年天數及太一又只如壬至午且應交司而治之少陰壬至午年司天應時而遷正得位者即下丁酉未得遷正者即地下丙申少陽未得退位者見丁壬不合德也即壬丙相對午中相配此失守非合德見非太過也即丁柔干失剛亦木運小虛也有小勝小復陽明如至即不復也後三年化厲名曰木厲其狀如風疫法治如前可大吐而治之假令戊申陽年太過如丁未天數太過者雖交得戊申年也雖戊臨中猶未遷正也太陰猶尚治天地已遷正厥陰在泉癸亥治地去歲壬戌太陽以退位作右間即天丁未地癸亥故地不奉天化也即厥陰當上奉少陽故不與太陰奉合故丁未與癸亥不相合丁癸相會火運太虛反受火勝故非太過也即夷則之管上太徴不應非戊癸相合也故火運不應其夷則未應其徵也下管癸亥少徵應之即下見癸亥主司地故同聲之不相應即上下天地不相合德故不相應也此戊癸失守其會後三年化疫也速至庚戌首尾三年大小善惡推疫至之年天數及太一又只如戊申如戊至申且應交司而治天少陽主戊中年司天應時遷正而治天也即下癸亥未得遷正者即地下壬戌太陽未退位者見戊癸未合德也即壬戊相對中戌相配此失守非合德又非太過即下癸柔干失剛見火運小虛也有小勝或無復也厥陰至即無復後三年化厲名曰火厲也治法如前治之法可寒之泄之已上五失守變五疫下五失守變五癘也即上剛柔二干共主連有失支不守之者以此五法即諸陽年也黄帝曰人氣不足天氣如虛人神失守神光不聚邪鬼干人致有夭亡可得聞乎人氣與天氣同失守即鬼邪干人致死也岐伯曰人之五藏一藏不足又會天虛感邪之至也其不足之藏與天氣同聲虛也人憂愁思慮即傷心又或遇少陰司天天數不及太陰作接間至即謂天虛也此即人氣天氣同虛也又遇驚而奪精汗出於心大驚汗出於心即心中精脉减少故神失守心也因而三虛神明失守先有勞神之病又遇少陰天數不及也又更驚而奪精此三會而神明失守也心爲君主之官神明出焉心先有病又遇天虛而感天重虛也心者任治於物故爲君主之官清靜栖靈故曰神明出焉神失守位即神遊上丹田在帝太一帝君泥丸君下太一帝君在頭曰泥丸君總衆神地君主之官神明失守其位遊於此處不守心位神既失守神光不聚神光即飛圓光也圓光不潔即圓光缺矣即鬼邪陰尸干人却遇火不及之歲有黑尸鬼見之令人暴亡其火連不及非只癸年戊年失守亦然火司天數不及亦然也黑尸鬼形如黑犬頭似婦人髪蓬不髻目大人見之吸人神魂皆作大聲卒然而亡人飲食勞倦即傷脾即飲食飽舉房事即氣滯於脾以勞疫氣滿悶脾藏有病也又或遇太陰司天天數不及即少陽作接間至即謂之虛也人氣與天氣不及即感天人氣虛及又虛也此即人氣虛而天氣虛也又遇飲食飽甚汗出於胃醉飽行房汗出於脾脾胃汗出即精血减少感天虛而作三虛牌神失守其位因而三虛脾神失守先有病於牌次遇天虛牌感天重虛又遇汗出而减其精血乃故名三虛也脾爲諫議之官智周出焉脾者心之子心有所憶謂之意意中所出謂之智智周萬物謂之神即脾胃神意智乃故失守其位者也神旣失守神光失位而不聚也神光不聚鬼乃干之却遇土不及之年或己年或甲年失守或太陰天虛青尸鬼見之令人卒亡人久坐濕地强力入水即傷腎汗出於腎即精血减少故作三虛即精亡心神失守其位也腎爲作强之官伎巧出焉因而三虛腎神失守神志失位神光不聚神精志三神虛失位遊於黃庭司命君之下乃即圓光缺矣却遇木不及之年或辛不會符或丙年失守或太陽司天虛有黄尸鬼至見之令人暴亡有此三虛又遇水不及即黃尸鬼干人牛頭身黃見之時吸人神魂皆暴亡也人或恚怒氣逆上而不下即傷肝也又遇厥陰司天天數不及即少陰作接間至是謂天虛也肝先病又遇天虛而感重虛也此謂天虛人虛也又遇疾走恐懼汗出於肝肝爲將軍之官謀慮出焉神位失守神光不聚神光不聚即圓光缺而不周尸鬼乃干人也又遇木不及年或丁年不符或壬年失守或厥陰司天虛也有白尸鬼見之令人暴亡也有此三虛者即神遊失守白尸鬼干人頭如鷄身白有白毛見之吸人神魂皆卒然而亡也已上五失守者天虛而人虛也神遊失守其位即有五尸鬼干人令人暴亡也謂之曰尸厥但卒然而亡口中無涎者舌卵卵縮者尸厥若出涎而舌卵者盛厥也人犯五神易位即神光不圓也非但尸鬼即一切邪犯者皆是神失守位故也神失守位雖其體中而二氣失位也即神光不聚而邪犯之有妖魅交通往來皆是五神失守乃邪所至也此謂得守者生失守者死得守者本位而五神各得其居即神光乃圓明而聚矣故一切邪不犯之乃生也得神者昌失神者亡老子云氣來入身謂之生神去於身謂之死故曰命由神生命生神在即命生神去即命夭矣所謂神遊失守即不離身故不可便死也其主管在頭上三尊高位靈主言也即太一帝君在頭曰泥丸總神也無英君左制三魂也白元君右拘七魄也即魂爲陽神也魄爲陰鬼也若無上三虛主之神離位者死今五神失守亦有主歸即神光不聚圓光亦缺故邪干犯之若神失守其位即知人生神昌黄帝内經素問遺篇卷之五
